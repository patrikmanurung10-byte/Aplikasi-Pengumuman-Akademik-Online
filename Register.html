<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Daftar Akun | APAO Polibatam</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #e8f3ff, #f8faff);
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: 'Poppins', sans-serif;
    }
    .card {
      border: none;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      border-radius: 15px;
      width: 100%;
      max-width: 400px;
    }
    .logo {
      width: 120px;
      display: block;
      margin: 20px auto 10px;
    }
  </style>
</head>
<body>

  <div class="card p-4 text-center">
    <img src="logo poltek.png" alt="Logo Polibatam" class="logo">
    <h5 class="mb-1">Daftar Akun Baru</h5>
    <p class="text-muted mb-4">Aplikasi Pengumuman Akademik Online<br>Polibatam</p>

    <form onsubmit="return handleDaftar()">
      <div class="mb-3 text-start">
        <label class="form-label">Nama Lengkap</label>
        <input type="text" id="nama" class="form-control" placeholder="Masukkan nama lengkap" required>
      </div>
      <div class="mb-3 text-start">
        <label class="form-label">Username</label>
        <input type="text" id="username" class="form-control" placeholder="Masukkan username" required>
      </div>
      <div class="mb-3 text-start">
        <label class="form-label">Peran</label>
        <select id="peran" class="form-select" required onchange="updateLinkLogin()">
          <option value="">Pilih peran</option>
          <option value="mahasiswa">Mahasiswa</option>
          <option value="dosen">Dosen</option>
          <option value="admin">Admin</option>
        </select>
      </div>
      <div class="mb-3 text-start">
        <label class="form-label">Password</label>
        <input type="password" id="password" class="form-control" placeholder="Masukkan password" required>
      </div>
      <div class="mb-3 text-start">
        <label class="form-label">Konfirmasi Password</label>
        <input type="password" id="confirm" class="form-control" placeholder="Konfirmasi password" required>
      </div>
      <button type="submit" class="btn btn-primary w-100">Daftar</button>
    </form>

    <!-- Bagian login otomatis sesuai peran -->
    <p class="mt-3 mb-0">
      Sudah punya akun?
      <a id="loginLink" href="#" class="text-decoration-none">Masuk di sini</a>
    </p>
    <small class="text-muted d-block mt-3">© 2024 Politeknik Negeri Batam. All rights reserved.</small>
  </div>

  <script>
    // Ubah link login sesuai peran yang dipilih
    function updateLinkLogin() {
      const peran = document.getElementById("peran").value;
      const link = document.getElementById("loginLink");
 
      if (peran === "Mahasiswa") {
        link.href = "Login_Mahasiswa.html";
      } else if (peran === "dosen") {
        link.href = "Login_Dosen.html";
      } else if (peran === "admin") {
        link.href = "Login_Admin.html";
      } else {
        link.href = "#";
      }
    }

    // Arahkan setelah daftar
    function handleDaftar() {
      const peran = document.getElementById("peran").value;
      const pass = document.getElementById("password").value;
      const confirm = document.getElementById("confirm").value;

      if (pass !== confirm) {
        alert("Konfirmasi password tidak cocok!");
        return false;
      }

      if (peran === "mahasiswa") {
        window.location.href = "Login_Mahasiswa.html";
      } else if (peran === "dosen") {
        window.location.href = "Login_Admin.html";
      } else if (peran === "admin") {
        window.location.href = "Login_Admin.html";
      } else {
        alert("Silakan pilih peran terlebih dahulu!");
      }

      return false;
    }
  </script>

</body>
</html>
